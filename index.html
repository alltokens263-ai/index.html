<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tokens World 🌎</title>
</head>
<body>
    <h1>¡Hola, mundo Bienvenidos a All Tokens World 🌎!</h1>
    <p>Vota por All Tokens World y gana 5 WDD.</p>
</body>
    <style>
        /* Estilos CSS */
        body {
            /* Eliminamos los márgenes y rellenos por defecto del navegador */
            margin: 0;
            padding: 0;
            
            /* Hacemos que el cuerpo ocupe toda la altura de la pantalla */
            height: 100vh;
            
            /* Indicamos la ruta de nuestra imagen de fondo */
            background-image: url(https://ibb.co/HDW0K4K6);
            
            /* Centramos la imagen en la pantalla */
            background-position: center;
            
            /* Evitamos que la imagen se repita como un mosaico */
            background-repeat: no-repeat;
            
            /* Ajustamos la imagen para que cubra todo el fondo sin deformarse */
            background-size: cover;
            
            /* Fijamos la imagen para que no se mueva al hacer scroll (opcional) */
            background-attachment: fixed;
        }

        .contenido {
            /* Un contenedor semitransparente para que el texto sea legible */
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</html>
